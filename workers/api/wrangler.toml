name = "lens-api"
main = "src/index.ts"
compatibility_date = "2026-04-21"
compatibility_flags = ["nodejs_compat"]

[vars]
# "fixture" uses the hardcoded catalog in src/fixtureCatalog.ts (fast, deterministic — demo default).
# "real" hits the live Opus 4.7 web_search tool.
LENS_SEARCH_MODE = "fixture"

# Secrets set via: wrangler secret put ANTHROPIC_API_KEY

[observability]
enabled = true

# [[kv_namespaces]]
# binding = "CACHE"
# id = "<fill-in-after-wrangler-kv-namespace-create>"

# [[r2_buckets]]
# binding = "FIXTURES"
# bucket_name = "lens-fixtures"
