name = "lens-api"
main = "src/index.ts"
compatibility_date = "2026-04-21"
compatibility_flags = ["nodejs_compat"]

[vars]
# B1 (2026-04-22): default changed to "real" per user directive "everything has to have web search".
# Every audit now runs Opus 4.7 web_search_20260209 and merges with pack representativeSkus.
# "fixture" = escape hatch for CI regression tests only — seeds-only, no network.
LENS_SEARCH_MODE = "real"
MAGIC_LINK_BASE_URL = "https://lens-b1h.pages.dev"
RESEND_FROM_EMAIL = "Lens <no-reply@lens.example>"

# Secrets set via: wrangler secret put <NAME>
# Required for F1 auth: JWT_SECRET.
# Optional: RESEND_API_KEY (falls back to console log), GMAIL_OAUTH_CLIENT_ID/SECRET (F12).

[observability]
enabled = true

[triggers]
crons = [
  "*/15 * * * *",
  "17 */2 * * *",
  "13 6 * * 1",
  "7 9 * * *",
  "23 10 * * *",
  "31 7 * * 1",
  "41 * * * *"
]

[[d1_databases]]
binding = "LENS_D1"
database_name = "lens-production"
database_id = "a88ccf86-7a09-4cfc-a189-b6104984203d"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "LENS_KV"
id = "49edb0b70c3945b3af1a89f7ba3d9ed4"

[[r2_buckets]]
binding = "LENS_R2"
bucket_name = "lens-blobs"

# F18 — Rate limit Durable Object
[[durable_objects.bindings]]
name = "RATE_LIMIT_DO"
class_name = "RateLimitCounter"

[[migrations]]
tag = "v1"
new_classes = ["RateLimitCounter"]
